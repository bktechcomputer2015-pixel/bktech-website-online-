<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BKTech Student Registration</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#1565C0,#42A5F5);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.signup-box{

width:100%;
max-width:520px;
background:#fff;
padding:35px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.2);

}

.logo{

text-align:center;
margin-bottom:25px;

}

.logo img{

width:90px;
height:90px;
object-fit:contain;

}

.logo h2{

color:#1565C0;
margin:10px 0;

}

.input-box{

margin-bottom:18px;

}

.input-box input,
.input-box select{

width:100%;
padding:14px;
border:2px solid #ddd;
border-radius:10px;
font-size:15px;
outline:none;
box-sizing:border-box;

}

.input-box input:focus,
.input-box select:focus{

border-color:#1565C0;

}

button{

width:100%;
padding:14px;
background:#1565C0;
color:#fff;
border:none;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;

}

button:hover{

background:#0D47A1;

}

.login-link{

text-align:center;
margin-top:18px;

}

.login-link a{

color:#1565C0;
font-weight:600;
text-decoration:none;

}

</style>

</head>

<body>

<div class="signup-box">

<div class="logo">

<img src="images/logo.png" alt="BKTech Logo">

<h2>BKTech Computer & Library</h2>

<p>Create Student Account</p>

</div>

<div class="input-box">
<input type="text" id="name" placeholder="Full Name">
</div>

<div class="input-box">
<input type="text" id="mobile" placeholder="Mobile Number">
</div>

<div class="input-box">
<input type="email" id="email" placeholder="Email Address">
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Create Password">
</div>

<div class="input-box">
<select id="course">

<option value="">Select Course</option>

<option>DCA</option>
<option>ADCA</option>
<option>PGDCA</option>
<option>Tally Prime</option>
<option>CCC</option>
<option>Typing</option>
<option>MS Office</option>
<option>Web Development</option>
<option>Python</option>
<option>Java</option>

</select>
</div>
<div class="input-box">
<input type="text" id="address" placeholder="Full Address">
</div>

<div class="input-box">
<input type="text" id="city" placeholder="City">
</div>

<div class="input-box">
<input type="text" id="state" placeholder="State">
</div>

<div class="input-box">
<input type="text" id="pincode" placeholder="Pin Code">
</div>

<button onclick="signup()">
<i class="fas fa-user-plus"></i>
Create Account
</button>

<div class="login-link">

<p>
Already have an account?
<a href="login.html">
Login Here
</a>
</p>

<p style="font-size:13px;color:#666;margin-top:10px;">
By creating an account you agree to the BKTech Terms & Conditions.
</p>

</div>

</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BKTech Login</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#1565C0,#42A5F5);
font-family:'Poppins',sans-serif;
}

.login-box{

width:95%;
max-width:420px;
background:#fff;
padding:35px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,.2);

}

.logo{

text-align:center;
margin-bottom:25px;

}

.logo img{

width:90px;
height:90px;
object-fit:contain;

}

.logo h2{

margin-top:10px;
color:#1565C0;

}

.input-box{

margin-bottom:18px;

}

.input-box input{

width:100%;
padding:14px;
border:2px solid #ddd;
border-radius:10px;
font-size:15px;
outline:none;

}

.input-box input:focus{

border-color:#1565C0;

}

button{

width:100%;
padding:14px;
border:none;
background:#1565C0;
color:#fff;
font-size:16px;
border-radius:10px;
cursor:pointer;
font-weight:600;

}

button:hover{

background:#0D47A1;

}

.link{

text-align:center;
margin-top:15px;

}

.link a{

color:#1565C0;
font-weight:600;
text-decoration:none;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

<img src="images/logo.png" alt="BKTech Logo">

<h2>BKTech Computer & Library</h2>

<p>Student Login Portal</p>

</div>

<div class="input-box">

<input
type="email"
id="email"
placeholder="Enter Email">

</div>

<div class="input-box">

<input
type="password"
id="password"
placeholder="Enter Password">

</div>

<button onclick="login()">
Login
</button>

<div class="link">

<p>

<a href="#" onclick="forgotPassword()">

Forgot Password?

</a>

</p>

<p>

Don't have an account?

<a href="signup.html">

Create Account

</a>

</p>

</div>

</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>

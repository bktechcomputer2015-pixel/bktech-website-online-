<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Online Admission | BKTech Computer & Library</title>

<link rel="stylesheet"
href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:#f4f7fb;

}

.container{

max-width:850px;
margin:40px auto;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.1);

}

h2{

text-align:center;
color:#1565C0;
margin-bottom:10px;

}

p{

text-align:center;
margin-bottom:25px;

}

.form-group{

margin-bottom:18px;

}

label{

font-weight:600;
display:block;
margin-bottom:6px;

}

input,
select,
textarea{

width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
outline:none;

}

textarea{

resize:none;

}

button{

width:100%;
padding:14px;
border:none;
background:#1565C0;
color:#fff;
font-size:17px;
font-weight:600;
border-radius:10px;
cursor:pointer;

}

button:hover{

background:#0D47A1;

}

</style>

</head>

<body>

<div class="container">

<h2>

🎓 Online Admission Form

</h2>

<p>

BKTech Computer & Library

Bhore, Gopalganj (Bihar)

</p>

<form id="admissionForm">

<div class="form-group">

<label>Student Name</label>

<input
type="text"
id="studentName"
required>

</div>

<div class="form-group">

<label>Father's Name</label>

<input
type="text"
id="fatherName"
required>

</div>

<div class="form-group">

<label>Mobile Number</label>

<input
type="tel"
id="mobile"
required>

</div>

<div class="form-group">

<label>Email Address</label>

<input
type="email"
id="email">

</div>
  <div class="form-group">

<label>Date of Birth</label>

<input
type="date"
id="dob"
required>

</div>

<div class="form-group">

<label>Gender</label>

<select id="gender" required>

<option value="">Select Gender</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="form-group">

<label>Qualification</label>

<select id="qualification" required>

<option value="">Select Qualification</option>

<option>8th Pass</option>

<option>10th Pass</option>

<option>12th Pass</option>

<option>Graduate</option>

<option>Post Graduate</option>

<option>Other</option>

</select>

</div>

<div class="form-group">

<label>Select Course</label>

<select id="course" required>

<option value="">Choose Course</option>

<option>DCA</option>

<option>ADCA</option>

<option>PGDCA</option>

<option>Tally Prime + GST</option>

<option>CCC</option>

<option>Basic Computer</option>

<option>Advanced Excel</option>

<option>Typing (Hindi)</option>

<option>Typing (English)</option>

<option>Web Designing</option>

<option>Python Programming</option>

<option>Java Programming</option>

<option>C Programming</option>

<option>C++ Programming</option>

<option>Cyber Security</option>

</select>

</div>

<div class="form-group">

<label>Full Address</label>

<textarea
id="address"
rows="4"
placeholder="Enter Your Full Address"
required></textarea>

</div>

<div class="form-group">

<label>Why do you want to join BKTech?</label>

<textarea
id="message"
rows="3"
placeholder="Optional"></textarea>

</div>

<button type="submit">

<i class="fas fa-paper-plane"></i>

Submit Admission

</button>
  <!-- ===========================
Status Message
=========================== -->

<div id="successBox"
style="
display:none;
margin-top:20px;
padding:15px;
background:#e8f5e9;
border-left:5px solid #4CAF50;
border-radius:10px;
color:#2E7D32;
font-weight:600;
text-align:center;">

✅ Admission Submitted Successfully!

</div>

<!-- ===========================
Loading
=========================== -->

<div id="loadingBox"
style="
display:none;
margin-top:20px;
text-align:center;">

<i class="fas fa-spinner fa-spin"
style="font-size:30px;color:#1565C0;"></i>

<p>Please wait...
Submitting your admission.</p>

</div>

</form>

<hr style="margin:35px 0;">

Institute Information
=========================== -->

<p>

</p>

</div>

=========================== -->

style="
display:flex;
gap:15px;
margin-top:30px;
flex-wrap:wrap;">

<a
href="index.html"
style="
flex:1;
text-decoration:none;">

<button type="button">

🏠 Back to Home

</button>

</a>

<a
href="https://wa.me/916200287571"
target="_blank"

flex:1;
text-decoration:none;">

<button
type="button"
style="background:#25D366;">

💬 WhatsApp

</button>

</a>

</div>

</div>

</body>

</html>
